# CI: the SDK's consistency gates + both engine build flavors, on every push/PR.
# No game files are involved — CI proves the build and the ABI guarantees, not gameplay.
name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Fast job: the SDK's mechanical guarantees (generated-file drift, ID permanence,
  # ABI append-only policy, exposure order, i386 layout probe, override-target
  # validation) plus the two teaching example plugins.
  sdk-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install a 32-bit-capable compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib python3

      - name: SDK gates
        run: make -C sdk check

      - name: Build the teaching example plugins
        run: |
          make -C sdk/examples/hello
          make -C sdk/examples/wraptest

  # Full engine build: both flavors, with the link-time self-checks
  # (nm-clean assertion; pads present in moddable, absent in vanilla).
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable i386 packages
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update

      - name: Install build dependencies
        run: |
          sudo apt-get install -y gcc-multilib python3 cmake git pkg-config \
            libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 libxi-dev:i386 \
            libasound2-dev:i386 libpulse-dev:i386 \
            libxcursor-dev:i386 libxss-dev:i386 libxtst-dev:i386 libxfixes-dev:i386
          # SDL's build auto-skips backends whose dev packages aren't available for
          # i386 on the runner (e.g. PipeWire); audio still works via ALSA/Pulse.

      - name: Cache the 32-bit SDL3 build
        id: sdl-cache
        uses: actions/cache@v4
        with:
          path: roth_c/third_party
          key: sdl3-i386-v3-${{ runner.os }}-${{ hashFiles('tools/build_sdl3_i386.sh') }}

      - name: Build 32-bit SDL3 (cache miss only)
        if: steps.sdl-cache.outputs.cache-hit != 'true'
        env:
          PKG_CONFIG_PATH: /usr/lib/i386-linux-gnu/pkgconfig
        run: tools/build_sdl3_i386.sh

      - name: Build the moddable engine
        run: make -C roth_c

      - name: Build the vanilla engine
        run: make -C roth_c FLAVOR=vanilla

      - name: Upload binaries (workflow artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: engine-binaries
          path: |
            roth_c/roth
            roth_c/roth-vanilla

  # The MinGW i686 cross-build gate — NON-BLOCKING while the port is in progress
  # until it goes green (continue-on-error). It builds win32 SDL3 from source (same pin
  # as the Linux job) then attempts both Windows flavors via the CROSS=mingw Makefile axis. The
  # Both Windows flavors link and pass their PE post-link gates; the job stays non-blocking
  # until the port ships (continue-on-error), then flips to a required gate. The job shows
  # how far it got. It flips to REQUIRED the day it boots green.
  cross-mingw:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install the MinGW i686 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686 \
            binutils-mingw-w64-i686 cmake ninja-build python3 git
          # No i386 -dev client libs: win32 SDL uses in-tree Win32/WASAPI backends (build design B).

      - name: Cache the win32 SDL3 build
        id: sdl-win-cache
        uses: actions/cache@v4
        with:
          # A distinct SUB-PATH (never the whole third_party/) so it can't clobber the engine job's
          # sdl3-i386 cache over the shared third_party dir. Keyed on BOTH SDL scripts: the win32
          # pin must stay in lockstep with the i386 pin, so a change to either busts it.
          path: roth_c/third_party/sdl3-win32
          key: sdl3-win32-v1-${{ runner.os }}-${{ hashFiles('tools/build_sdl3_win32.sh', 'tools/build_sdl3_i386.sh') }}

      - name: Build win32 SDL3 (cache miss only)
        if: steps.sdl-win-cache.outputs.cache-hit != 'true'
        run: tools/build_sdl3_win32.sh

      - name: Build the moddable Windows binary (CROSS=mingw)
        run: make -C roth_c CROSS=mingw

      - name: Build the vanilla Windows binary (CROSS=mingw)
        run: make -C roth_c CROSS=mingw FLAVOR=vanilla

      - name: Upload rothc.exe artifacts (whatever built)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          # A red link leaves no exe — warn (don't fail the upload step confusingly) so the job's
          # own build steps remain the signal, not the artifact step.
          if-no-files-found: warn
          path: |
            roth_c/rothc.exe
            roth_c/rothc-vanilla.exe
